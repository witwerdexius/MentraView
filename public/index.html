<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Reader – G1</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 32px 24px;
      width: 100%;
      max-width: 420px;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .subtitle {
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 6px;
    }

    input[type="url"] {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 12px 14px;
      color: #f0f0f0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="url"]:focus {
      border-color: #555;
    }

    button {
      margin-top: 16px;
      width: 100%;
      background: #f0f0f0;
      color: #111;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-list {
      background: #0d2b1a;
      color: #4ade80;
      border: 1px solid #166534;
    }

    .btn-list:hover:not(:disabled) {
      background: #14432a;
    }

    .status {
      margin-top: 20px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 0.85rem;
      line-height: 1.5;
      display: none;
    }

    .status.success { background: #0d2b1a; color: #4ade80; border: 1px solid #166534; }
    .status.error   { background: #2b0d0d; color: #f87171; border: 1px solid #7f1d1d; }
    .status.loading { background: #1a1a2b; color: #93c5fd; border: 1px solid #1e3a8a; }
    .status.show    { display: block; }

    .hint {
      margin-top: 24px;
      font-size: 0.75rem;
      color: #444;
      text-align: center;
      line-height: 1.6;
    }

    .glass-status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
      font-size: 0.8rem;
      color: #555;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #555;
      flex-shrink: 0;
    }

    .dot.connected { background: #4ade80; box-shadow: 0 0 6px #4ade8088; }

    .user-id-section {
      margin-bottom: 20px;
    }

    .user-id-row {
      display: flex;
      gap: 8px;
    }

    .user-id-row input {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 10px 14px;
      color: #f0f0f0;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      min-width: 0;
    }

    .user-id-row input:focus { border-color: #555; }

    .refresh-btn {
      margin-top: 0;
      width: auto;
      padding: 0 14px;
      background: #2a2a2a;
      color: #888;
      font-size: 1rem;
      border-radius: 10px;
      border: 1px solid #333;
      cursor: pointer;
      flex-shrink: 0;
    }

    .refresh-btn:hover { color: #f0f0f0; border-color: #555; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📖 Web Reader</h1>
    <p class="subtitle">Artikel auf der G1 lesen</p>

    <div id="userIdSection" class="user-id-section">
      <label for="userIdInput">User ID</label>
      <div class="user-id-row">
        <input type="text" id="userIdInput" placeholder="Wird geladen…" autocomplete="off" />
        <button class="refresh-btn" id="refreshBtn" title="Sessions neu laden">↻</button>
      </div>
    </div>

    <div class="glass-status">
      <div class="dot" id="dot"></div>
      <span id="glassLabel">Brille wird gesucht…</span>
    </div>

    <label for="urlInput">Website-Adresse</label>
    <input
      type="url"
      id="urlInput"
      placeholder="https://beispiel.de/artikel"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
    />
    <button id="loadBtn" disabled>Auf Brille laden</button>
    <button id="listBtn" class="btn-list" disabled>🛒 Einkaufsliste anzeigen</button>

    <div class="status" id="statusBox"></div>

    <p class="hint">
      Kurz tippen → nächste Seite<br>
      Lang drücken → vorherige Seite
    </p>
  </div>

  <script>
    const urlParams = new URLSearchParams(location.search);

    const userIdSection = document.getElementById("userIdSection");
    const userIdInput   = document.getElementById("userIdInput");
    const refreshBtn    = document.getElementById("refreshBtn");
    const urlInput      = document.getElementById("urlInput");
    const loadBtn       = document.getElementById("loadBtn");
    const listBtn       = document.getElementById("listBtn");
    const statusBox     = document.getElementById("statusBox");
    const dot           = document.getElementById("dot");
    const glassLabel    = document.getElementById("glassLabel");

    // userId aus URL-Parameter (gesetzt von MentraOS) oder manuell
    let userId = urlParams.get("userId") || "";

    if (userId) {
      // Direkt von MentraOS geliefert — Eingabefeld ausblenden
      userIdSection.style.display = "none";
    } else {
      // Kein URL-Parameter → aktive Sessions vom Server laden
      loadSessions();
    }

    function setStatus(text, type) {
      statusBox.textContent = text;
      statusBox.className = `status ${type} show`;
    }

    // ── Sessions vom Server laden ─────────────────────────────────────
    async function loadSessions() {
      userIdInput.placeholder = "Wird geladen…";
      try {
        const res  = await fetch("/sessions");
        const data = await res.json();
        const ids  = data.sessions || [];

        if (ids.length === 1) {
          // Genau eine Session → automatisch auswählen
          userId = ids[0];
          userIdInput.value = userId;
          checkGlassStatus();
        } else if (ids.length > 1) {
          // Mehrere Sessions → Datalist-Dropdown anbieten
          userIdInput.placeholder = "Session auswählen oder eingeben";
          let list = document.getElementById("sessionsList");
          if (!list) {
            list = document.createElement("datalist");
            list.id = "sessionsList";
            document.body.appendChild(list);
            userIdInput.setAttribute("list", "sessionsList");
          }
          list.innerHTML = "";
          ids.forEach(id => {
            const opt = document.createElement("option");
            opt.value = id;
            list.appendChild(opt);
          });
        } else {
          userIdInput.placeholder = "Keine aktive Session — ID manuell eingeben";
        }
      } catch {
        userIdInput.placeholder = "Server nicht erreichbar";
      }
    }

    refreshBtn.addEventListener("click", loadSessions);

    userIdInput.addEventListener("change", () => {
      userId = userIdInput.value.trim();
      checkGlassStatus();
    });

    // ── Brille-Verbindungsstatus pollen ──────────────────────────────
    async function checkGlassStatus() {
      if (!userId) {
        glassLabel.textContent = "Bitte User ID eingeben oder ↻ drücken";
        dot.classList.remove("connected");
        loadBtn.disabled = true;
        return;
      }
      try {
        const res  = await fetch(`/status?userId=${encodeURIComponent(userId)}`);
        const data = await res.json();
        if (data.connected) {
          dot.classList.add("connected");
          glassLabel.textContent = "G1 verbunden";
          loadBtn.disabled = false;
          listBtn.disabled = false;
        } else {
          dot.classList.remove("connected");
          glassLabel.textContent = "Brille nicht verbunden";
          loadBtn.disabled = true;
          listBtn.disabled = true;
        }
      } catch {
        glassLabel.textContent = "Server nicht erreichbar";
      }
    }

    checkGlassStatus();
    setInterval(checkGlassStatus, 4000);

    // ── Artikel laden ────────────────────────────────────────────────
    loadBtn.addEventListener("click", async () => {
      const url = urlInput.value.trim();
      if (!url) {
        setStatus("Bitte eine URL eingeben.", "error");
        return;
      }

      loadBtn.disabled = true;
      setStatus("⏳ Artikel wird geladen…", "loading");

      try {
        const res  = await fetch("/load", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ userId, url }),
        });
        const data = await res.json();

        if (res.ok) {
          setStatus(
            `✅ „${data.title}" geladen\n${data.pages} Seiten auf der Brille`,
            "success"
          );
        } else {
          setStatus(`❌ ${data.error}`, "error");
        }
      } catch {
        setStatus("❌ Verbindung zum Server fehlgeschlagen.", "error");
      } finally {
        loadBtn.disabled = false;
      }
    });

    urlInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") loadBtn.click();
    });

    // ── Einkaufsliste auf Brille anzeigen ────────────────────────────
    listBtn.addEventListener("click", async () => {
      listBtn.disabled = true;
      setStatus("⏳ Liste wird geladen…", "loading");

      try {
        const res  = await fetch(`/showlist?userId=${encodeURIComponent(userId)}`, {
          method: "POST",
        });
        const data = await res.json();

        if (res.ok) {
          setStatus(`✅ ${data.count} Artikel auf der Brille`, "success");
        } else {
          setStatus(`❌ ${data.error}`, "error");
        }
      } catch {
        setStatus("❌ Verbindung zum Server fehlgeschlagen.", "error");
      } finally {
        listBtn.disabled = false;
      }
    });

    // ── Even Realities Hub Bridge (läuft auf G1/G2-Brille) ──────────
    // Wenn der WebView auf der Brille ausgeführt wird, stellt Even Realities
    // das globale `bridge`-Objekt bereit. Tipp- und Wischgesten werden hier
    // abgefangen und via POST /navigate an den Server weitergeleitet.
    //
    // OsEventTypeList:
    //   0 = CLICK_EVENT (Tippen)        → nächste Seite
    //   1 = SCROLL_TOP_EVENT (oben)     → vorherige Seite
    //   2 = SCROLL_BOTTOM_EVENT (unten) → nächste Seite
    //   3 = DOUBLE_CLICK_EVENT          → nächste Seite
    if (typeof bridge !== "undefined" && typeof bridge.onEvenHubEvent === "function") {
      bridge.onEvenHubEvent(async (event) => {
        const eventType =
          event?.textEvent?.eventType ??
          event?.listEvent?.eventType ??
          event?.eventType;

        console.log("[Bridge] eventType:", eventType, "userId:", userId);

        if (!userId || eventType == null) return;

        const direction =
          eventType === 1 ? "prev"   // SCROLL_TOP_EVENT → zurück
          : [0, 2, 3].includes(eventType) ? "next"  // Tippen / Wischen runter → vor
          : null;

        if (!direction) return;

        try {
          await fetch("/navigate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ userId, direction }),
          });
        } catch (e) {
          console.error("[Bridge] /navigate Fehler:", e);
        }
      });
    }
  </script>
</body>
</html>
